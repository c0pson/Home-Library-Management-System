services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: library
      DB_USER: library_user
      DB_PASSWORD: library_password
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../database/schema/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro
      - ../database/schema/indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql:ro
      - ../database/functions/procedures.sql:/docker-entrypoint-initdb.d/03_procedures.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
